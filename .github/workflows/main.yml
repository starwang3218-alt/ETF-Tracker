name: Daily ETF Quant Pipeline

on:
  # schedule:
  #   - cron: '30 22 * * 1-5'  # 暂时关掉自动运行，防止半夜报错
  workflow_dispatch:          # 仍然保留手动测试按钮

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 抓取仓库代码与历史数据
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 

    - name: ⚙️ 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 安装核心依赖包
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 执行量化处理流 (全自动四步走)
      run: |
        python step1_download.py
        python step2_clean.py
        python step3_aggregate.py
        python step4_calculate_delta.py

    - name: 💾 将异动报告推送回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Quant Bot"
        
        # 1. 尝试把 data 文件夹下所有符合白名单的 CSV 都添加进来
        # 即使 Delta 报告没生成，只要有 Master_Holdings 也会被添加
        git add data/*.csv || echo "没有发现新的 CSV 文件"
        
        # 2. 提交更改。|| true 的作用是：即使没有什么可提交的（比如数据没变化），也不要让程序崩溃
        git commit -m "🤖 自动更新: 机构持仓底牌与异动监控" || echo "今天数据无变化，跳过提交"
        
        # 3. 推送回仓库
        git push
