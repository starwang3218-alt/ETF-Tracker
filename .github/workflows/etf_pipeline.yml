name: 每日 ETF 持仓自动化流水线

on:
  # schedule:
  #   - cron: '30 0 * * 2-6' 
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装所有依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright pandas openpyxl numpy cloudscraper
          playwright install chromium

      - name: 4. 全量下载 ETF 原始数据
        run: |
          python download_holdings_v3.py -i 每日ETF下载地址.txt -o downloads/ --overwrite
        continue-on-error: true

      - name: 5. 究极清洗 (自动避让、找表头、洗净)
        run: |
          python step2_clean_unified.py
        continue-on-error: true

      - name: 6. 万剑归宗 (合并出 Master 终极表)
        run: |
          python step3_merge_data.py
        continue-on-error: true

      - name: 7. 漏网排查与核心分析计算
        run: |
          python step4_check_missing.py
          python step5_abc_analysis.py
          python step6_price_volume.py
        continue-on-error: true

      - name: 8. 📤 上传终极数据包与研报供下载
        uses: actions/upload-artifact@v4
        with:
          name: ETF-Master-Data-And-Reports
          path: |
            data/merged/master_holdings.csv
            data/cleaned/
            reports/
            需要手动下载的ETF.txt
          retention-days: 7
