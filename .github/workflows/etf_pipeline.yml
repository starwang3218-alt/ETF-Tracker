name: 每日 ETF 持仓自动化流水线

on:
  schedule:
    - cron: '30 0 * * 1-5' # 周一至周五，北京时间早上 8:30
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出代码库
        uses: actions/checkout@v4

      - name: 2. 设置 Python 3.10 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 3. 安装依赖和浏览器内核
        run: |
          pip install requests beautifulsoup4 lxml playwright pandas
          playwright install chromium

      - name: 4. 第一阶段：处理景顺数据 (下载 + 清洗)
        run: |
          python download_holdings_v3.py -i 景顺每日ETF下载地址.txt -o downloads/invesco
          python step2_clean_invesco.py
        continue-on-error: true

      - name: 5. 第二阶段：处理其他机构 (下载 + 清洗)
        run: |
          python step1_download.py
          python step2_clean.py
        continue-on-error: true

      - name: 6. 第三阶段：全局合并与量化分析 (聚合 + 算增量)
        run: |
          python merge_report.py
          python step3_aggregate.py
          python step4_calculate_delta.py

      - name: 7. 提交最新数据和报告到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ 最终合并持仓报告.csv Master_Holdings_*.csv 全市场_ETF_基础持仓宽表.csv
          git commit -m "Auto-update: 每日机构持仓报告与调仓监控更新" || echo "今天的数据没有变化，无需提交"
          git push
