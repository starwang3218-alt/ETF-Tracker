name: 每日 ETF 持仓自动化流水线

on:
  workflow_dispatch: # 保留手动按钮，想随时跑就随时点
  schedule:
    # 0 7 代表 UTC 7:00 (北京时间 15:00)
    # * * 代表每个月、每一天
    # 2-6 代表星期二到星期六
    - cron: '0 7 * * 2-6'

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装所有依赖
        run: |
          python -m pip install --upgrade pip
          # 优先读取 requirements.txt，如果没有再执行默认安装
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests beautifulsoup4 lxml playwright pandas openpyxl numpy cloudscraper yfinance; fi
          playwright install chromium

      - name: 4. 全量下载 ETF 原始数据
        run: |
          python download_holdings_v3.py -i 每日ETF下载地址.txt -o downloads/ --overwrite
        continue-on-error: true

      - name: 5. 究极清洗 (含防伪代码、As Of 日期提取)
        run: |
          python step2_clean_unified.py
        continue-on-error: true

      - name: 6. 万剑归宗 (合并出带风险权重的大表)
        run: |
          python step3_merge_and_analyze.py  # 👈 这里改成了我们今天写的最新脚本名
        continue-on-error: true

      - name: 7.1 漏网之鱼排查与生成通缉令
        run: python step4_check_missing.py
        continue-on-error: true

      - name: 7.2 生成 ABC 核心资产报告
        run: python step5_abc_analysis.py
        continue-on-error: true

      # - name: 7.3 生成量价合力终极榜单 (暂不开启，后续对接价格 API 再跑)
      #   run: python step6_price_volume.py
      #   continue-on-error: true

      - name: 8. 📤 上传终极数据包与研报供下载
        uses: actions/upload-artifact@v4
        with:
          name: ETF-Master-Data-And-Reports
          path: |
            data/master_holdings_analyzed.csv     # 👈 我们包含权重和风险扫描的终极分析表
            data/data_freshness_report.csv        # 👈 每天必须看的质检报告
            data/cleaned/                         # 备份单只清洗表
            reports/
            需要手动下载的ETF.txt
          retention-days: 15
