name: 每日 ETF 持仓自动化流水线

on:
  schedule:
    # 1. 北京时间 19:30 (UTC 11:30)，周二至周六运行
    - cron: '30 11 * * 2-6'
    
    # 2. 北京时间 23:00 (UTC 15:00)，周二至周六运行
    - cron: '0 15 * * 2-6'
    
  workflow_dispatch: # 保留手动触发按钮

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装所有依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas openpyxl numpy cloudscraper yfinance playwright
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m playwright install --with-deps chromium

      - name: 4. 全量下载 ETF 原始数据
        run: python download_holdings_v3.py -i 每日ETF下载地址.txt -o downloads/ --overwrite
        continue-on-error: true

      - name: 5. 究极清洗
        run: python step2_clean_unified.py
        continue-on-error: true

      - name: 6. 万剑归宗 (生成初始大表)
        run: python step3_merge_and_analyze.py
        continue-on-error: true

      # ================= 🌟 新增：注入股价环节 =================
      - name: 6.5 注入满血股价 (获取行情并注入大表)
        run: python step3_5_fetch_and_enrich_prices.py
        continue-on-error: true
      # =========================================================

      - name: 7.1 漏网之鱼排查
        run: python step4_check_missing.py
        continue-on-error: true

      - name: 7.2 生成 ABC 核心资产报告
        run: python step5_abc_analysis.py
        continue-on-error: true

      - name: 7.3 探测机构调仓异动 (Delta 计算)
        run: python step6_calculate_delta.py
        continue-on-error: true

      - name: 7.4 沉淀历史数据 (更新 Time Series)
        run: python step7_update_history.py
        continue-on-error: true

      # ================= 🌟 新增：数据碰撞环节 =================
      - name: 7.5 生成机构对撞报告 (挖掘 0->1 新开仓与机构异动)
        run: python step8_generate_report.py
        continue-on-error: true
      # =========================================================

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ETF-Daily-Results
          path: |
            data/*.csv
            reports/*.csv
            需要手动下载的ETF.txt
          retention-days: 15

      # ================= 🌟 修复：无死角防爆提交逻辑 =================
      - name: 9. 🤖 自动提交数据回仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 建立 reports 文件夹以防 git add 报错
          mkdir -p reports
          
          # 暴力打包：把 data 和 reports 文件夹里的所有 csv 全收了！
          git add data/*.csv
          git add reports/*.csv
          
          # 判断如果有改动就提交，没改动就跳过，完美解决报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: 更新带股价持仓快照与数据碰撞报告 [$(date +'%Y-%m-%d')]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
