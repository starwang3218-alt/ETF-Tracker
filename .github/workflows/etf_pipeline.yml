name: 每日 ETF 持仓自动化流水线

on:
  # schedule:
  #   # 第一次：北京时间 08:30 (UTC 00:30)
  #   - cron: '30 0 * * 2-6' 
  #   # 第二次：北京时间 15:00 (UTC 07:00)
  #   - cron: '0 7 * * 2-6'
  workflow_dispatch:  # 保留这个，这样你以后想手动跑的时候还能手动点

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出代码库
        uses: actions/checkout@v4

      - name: 2. 设置 Python 3.10 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 3. 安装依赖和浏览器内核
        run: |
          pip install requests beautifulsoup4 lxml playwright pandas openpyxl
          playwright install chromium

      - name: 4. 全量下载 (景顺+其他机构交错运行)
        run: |
          python download_holdings_v3.py -i 每日ETF下载地址.txt -o downloads/ --overwrite
        continue-on-error: true

      - name: 5. 第二阶段：处理其他机构 (下载 + 清洗)
        run: |
          python step1_download.py
          python step2_clean.py
        continue-on-error: true

      - name: 6. 第三阶段：全局合并与量化分析 (聚合 + 算增量)
        run: |
          python merge_report.py
          python step3_aggregate.py
          python step4_calculate_delta.py

      - name: 7. 终极防爆破：智能提交与推送
        run: |
          # 1. 设置机器人身份
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 2. 把所有变化（包括新生成的报告、以及被清理脚本删掉的旧数据）全部抓取
          git add .
          
          # 3. 智能判断：如果真有变化才提交，没变化就平稳跳过
          if ! git diff --cached --quiet; then
            git commit -m "📊 机构持仓自动更新: $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ 数据已成功推送到仓库！"
          else
            echo "⚠️ 今日无数据变化或下载失败，跳过 Git 提交，防止 128 报错闪退。"
          fi
